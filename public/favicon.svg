<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect x="1" y="1" width="30" height="30" rx="4" fill="#4F46E5"/>
  <!-- Grid lines - horizontal -->
  <line x1="5" y1="10" x2="27" y2="10" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="5" y1="16" x2="27" y2="16" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="5" y1="22" x2="27" y2="22" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <!-- Grid lines - vertical -->
  <line x1="10" y1="5" x2="10" y2="27" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="16" y1="5" x2="16" y2="27" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="22" y1="5" x2="22" y2="27" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <!-- Filled cells to suggest a schedule -->
  <rect x="11" y="5" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.85)"/>
  <rect x="17" y="11" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.85)"/>
  <rect x="5" y="17" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.85)"/>
  <rect x="23" y="17" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.85)"/>
  <rect x="11" y="23" width="4" height="4" rx="0.5" fill="rgba(255,255,255,0.85)"/>
</svg>
